<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shikanoko Nokonoko Koshitantan - Fixed</title>
    <style>
        /* Tên nhân vật */
        .char-name {
            position: absolute;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 2.2vw;
            color: white;
            pointer-events: none;
            z-index: 150; /* Cho tên lên trên cùng */
            text-shadow: 0 0 6px currentColor, 0 0 12px currentColor, 0 0 20px currentColor;
        }

        .name-4 { top: 55%; left: 8%; color: #4DB34D; }
        .name-3 { top: 45%; left: 27%; color: #b66cff; }
        .name-2 { top: 30%; left: 38%; color: #CCCC33; }
        .name-1 { top: 12%; left: 75%; color: #8b5a3c; }

        body {
            margin: 0; 
            padding: 40px 20px; /* Thêm padding để nội dung không sát mép màn hình */
            display: flex; 
            flex-direction: column; /* Chuyển flex thành cột để văn bản nằm dưới ảnh */
            justify-content: flex-start; /* Bắt đầu từ trên xuống để dễ cuộn */
            align-items: center;
            min-height: 100vh; 
            background-color: #FFFFCC; /* Đã đổi màu nền phía sau */
            gap: 40px; /* Khoảng cách giữa ảnh và khung chữ */
        }

        .shikanoko-container {
            position: relative;
            width: 100%; max-width: 1000px;
            aspect-ratio: 1.41; overflow: hidden;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .bg-layer { width: 100%; display: block; }

        /* Các lớp nhân vật */
        .char-link {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: block;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 10;
        }

        .char-link img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: all 0.4s ease;
        }

        /* 1. HIỆU ỨNG KHI RÊ CHUỘT VÀO CONTAINER */
        .shikanoko-container:hover .char-link { opacity: 0.4; }

        /* 2. KHU VỰC CẢM ỨNG (TOUCH ZONES) */
        .touch-zones {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            z-index: 200; /* Nằm trên cùng để nhận chuột */
        }
        .zone { flex: 1; height: 100%; cursor: pointer; }

        /* 3. ĐIỀU KHIỂN HIỆU ỨNG NỔI LÊN QUA ZONE */
        
        /* Khi hover vào Zone, ép nhân vật tương ứng nổi lên */
        .shikanoko-container:has(.zone-4:hover) .char-4,
        .shikanoko-container:has(.zone-3:hover) .char-3,
        .shikanoko-container:has(.zone-2:hover) .char-2,
        .shikanoko-container:has(.zone-1:hover) .char-1 {
            opacity: 1 !important;
            z-index: 100 !important;
            transform: scale(1.05);
        }

        /* Thêm bóng đổ cho ảnh khi nổi lên */
        .shikanoko-container:has(.zone-4:hover) .char-4 img,
        .shikanoko-container:has(.zone-3:hover) .char-3 img,
        .shikanoko-container:has(.zone-2:hover) .char-2 img,
        .shikanoko-container:has(.zone-1:hover) .char-1 img {
            filter: drop-shadow(0px 15px 15px rgba(0,0,0,0.4)) brightness(1.1);
        }

        /* Tùy chỉnh gốc phóng to */
        .char-4 { transform-origin: left bottom; }
        .char-3 { transform-origin: 30% bottom; }
        .char-2 { transform-origin: 50% bottom; }
        .char-1 { transform-origin: right bottom; }

        /* KHUNG THÔNG TIN CÂU LẠC BỘ */
        .club-info {
            background-color: #FFFF80;
            padding: 30px;
            border-radius: 20px; /* Bo tròn các góc */
            text-align: center;
            max-width: 800px;
            width: 90%;
            font-family: Arial, sans-serif;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #333;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        .club-info strong {
            display: block;
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

    <audio id="bg-music" src="pokemon.mp3"></audio>

    <div class="shikanoko-container">
        <img src="anh_nen.png" class="bg-layer" alt="Background">

        <div class="touch-zones">
            <div class="zone zone-4" onclick="window.open('https://www.facebook.com/hoangganh0106/', '_blank')"></div>
            <div class="zone zone-3" onclick="window.open('https://www.facebook.com/share/14WGHKYgCyr/', '_blank')"></div>
            <div class="zone zone-2" onclick="window.open('https://www.facebook.com/ca.lang.sau/', '_blank')"></div>
            <div class="zone zone-1" onclick="window.open('https://www.facebook.com/ito.haruno.2024', '_blank')"></div>
        </div>

        <div class="char-link char-4">
            <img src="anh_nv_4.png" alt="Nhân vật 4">
            <span class="char-name name-4">Shika</span>
        </div>

        <div class="char-link char-3">
            <img src="anh_nv_3.png" alt="Nhân vật 3">
            <span class="char-name name-3">Kuro</span>
        </div>

        <div class="char-link char-2">
            <img src="anh_nv_2.png" alt="Nhân vật 2">
            <span class="char-name name-2">Calangdu</span>
        </div>

        <div class="char-link char-1">
            <img src="anh_nv_1.png" alt="Nhân vật 1">
            <span class="char-name name-1">Haru</span>
        </div>
    </div>

    <div class="club-info">
        <strong>Thông tin câu lạc bộ:</strong>
        Câu lạc bộ chủ yếu nói về các bộ phim, anime, light novel và manga, ngoài ra còn bàn về những chủ đề âm nhạc và đời sống thường ngày.
    </div>

    <script>
        const audio = document.getElementById('bg-music');

        // Hàm thử tự động phát nhạc
        function playAudio() {
            audio.play().catch(error => {
                console.log("Trình duyệt chặn autoplay. Nhạc sẽ phát khi người dùng tương tác với trang.");
            });
        }

        // Cố gắng phát nhạc ngay khi load xong
        window.addEventListener('load', playAudio);

        // Phát nhạc khi click bất kỳ đâu trên trang (nếu autoplay bị trình duyệt chặn)
        document.body.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
            }
        }, { once: true });

        // Logic lặp lại nhạc sau 1 giây (1000ms) khi bài hát kết thúc
        audio.addEventListener('ended', () => {
            setTimeout(() => {
                audio.play();
            }, 1000);
        });
    </script>

</body>
</html>
