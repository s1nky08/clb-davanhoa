<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLB-DaVanHoa</title>
    <style>
        body {
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: center;
            min-height: 100vh; 
            background-image: url('anh_nen_moi.jpg'); 
            background-size: cover;
            gap: 40px; 
            cursor: url('anh_chuot.png'), auto; 
        }

        .zone { 
            flex: 1; 
            height: 100%; 
            cursor: url('anh_chuot.png'), pointer; 
        }

        /* Effect sao rơi */
        .magic-star {
            position: absolute;
            pointer-events: none;
            z-index: 9999; 
            color: #FFCC00; 
            font-size: 18px;
            text-shadow: 0 0 5px #FFFFAA; 
            animation: fallAnimation 0.8s linear forwards;
        }

        @keyframes fallAnimation {
            0% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, 60px) scale(0) rotate(90deg);
                opacity: 0;
            }
        }

        .char-name {
            position: absolute; font-family: Arial, sans-serif;
            font-weight: bold; font-size: 2.8vw; color: white;
            pointer-events: none; z-index: 150; 
            text-shadow: 0 0 6px currentColor, 0 0 12px currentColor, 0 0 20px currentColor;
        }
        .name-4 { top: 55%; left: 8%; color: #4DB34D; }
        .name-3 { top: 45%; left: 27%; color: #b66cff; }
        .name-2 { top: 30%; left: 38%; color: #CCCC33; }
        .name-1 { top: 12%; left: 75%; color: #8b5a3c; }

        .shikanoko-container {
            position: relative; width: 100%; max-width: 1000px;
            aspect-ratio: 1.41; overflow: hidden;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .bg-layer { width: 100%; display: block; }
        .char-link {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: block; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 10;
        }
        .char-link img { width: 100%; height: 100%; object-fit: cover; transition: all 0.4s ease; }
        .shikanoko-container:hover .char-link { opacity: 0.4; }
        .touch-zones { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 200; }
        
        .shikanoko-container:has(.zone-4:hover) .char-4,
        .shikanoko-container:has(.zone-3:hover) .char-3,
        .shikanoko-container:has(.zone-2:hover) .char-2,
        .shikanoko-container:has(.zone-1:hover) .char-1 {
            opacity: 1 !important; z-index: 100 !important; transform: scale(1.05);
        }
        .shikanoko-container:has(.zone-4:hover) .char-4 img,
        .shikanoko-container:has(.zone-3:hover) .char-3 img,
        .shikanoko-container:has(.zone-2:hover) .char-2 img,
        .shikanoko-container:has(.zone-1:hover) .char-1 img {
            filter: drop-shadow(0px 15px 15px rgba(0,0,0,0.4)) brightness(1.1);
        }
        .char-4 { transform-origin: left bottom; }
        .char-3 { transform-origin: 30% bottom; }
        .char-2 { transform-origin: 50% bottom; }
        .char-1 { transform-origin: right bottom; }

        .club-info {
            background-color: #FFFF80; padding: 30px; border-radius: 20px; 
            text-align: center; max-width: 800px; width: 90%;
            font-family: Arial, sans-serif; font-size: 1.2rem; line-height: 1.6;
            color: #333; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .club-info strong { display: block; font-size: 1.4rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <audio id="bg-music" src="pokemon.mp3"></audio>

    <div class="shikanoko-container">
        <img src="anh_nen.png" class="bg-layer" alt="Background">

        <div class="touch-zones">
            <div class="zone zone-4" onclick="window.open('https://www.facebook.com/hoangganh0106/', '_blank')"></div>
            <div class="zone zone-3" onclick="window.open('https://www.facebook.com/share/14WGHKYgCyr/', '_blank')"></div>
            <div class="zone zone-2" onclick="window.open('https://www.facebook.com/ca.lang.sau/', '_blank')"></div>
            <div class="zone zone-1" onclick="window.open('https://www.facebook.com/ito.haruno.2024', '_blank')"></div>
        </div>

        <div class="char-link char-4">
            <img src="anh_nv_4.png" alt="Nhân vật 4">
            <span class="char-name name-4">Shika</span>
        </div>
        <div class="char-link char-3">
            <img src="anh_nv_3.png" alt="Nhân vật 3">
            <span class="char-name name-3">Kuro</span>
        </div>
        <div class="char-link char-2">
            <img src="anh_nv_2.png" alt="Nhân vật 2">
            <span class="char-name name-2">Calangdu</span>
        </div>
        <div class="char-link char-1">
            <img src="anh_nv_1.png" alt="Nhân vật 1">
            <span class="char-name name-1">Haru</span>
        </div>
    </div>

    <div class="club-info">
        <strong>Thông tin câu lạc bộ:</strong>
        Câu lạc bộ chủ yếu nói về các bộ phim, anime, light novel và manga, ngoài ra còn bàn về những chủ đề âm nhạc và đời sống thường ngày.
    </div>

    <script>
        // Xử lý Audio
        const audio = document.getElementById('bg-music');
        
        window.addEventListener('load', () => {
            audio.play().catch(() => console.log("Autoplay blocked"));
        });

        document.body.addEventListener('click', () => {
            if (audio.paused) audio.play();
        }, { once: true });
        
        audio.addEventListener('ended', () => {
            setTimeout(() => audio.play(), 1000);
        });

        // Mouse trail effect
        let lastStarTime = 0;
        
        document.addEventListener('mousemove', (e) => {
            const now = Date.now();
            if (now - lastStarTime < 40) return; // throttle
            lastStarTime = now;

            const star = document.createElement('div');
            star.className = 'magic-star';
            star.innerHTML = '✨';
            
            star.style.left = `${e.pageX - 1}px`;
            star.style.top = `${e.pageY - 1}px`;
            
            document.body.appendChild(star);
            
            setTimeout(() => star.remove(), 800);
        });
    </script>

</body>
</html>
